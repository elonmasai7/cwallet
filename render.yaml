services:
  - type: web
    name: civicwallet-api
    env: node
    rootDir: apps/api
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run prisma:migrate:deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: AFRICASTALKING_API_KEY
        sync: false

