name: CivicWallet CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint TypeScript workspaces
        run: npm run lint
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/civicwallet_test?schema=public
          JWT_ACCESS_SECRET: test-access-secret-123456
          JWT_REFRESH_SECRET: test-refresh-secret-123456

      - name: Run backend tests
        run: npm --workspace apps/api run test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/civicwallet_test?schema=public
          JWT_ACCESS_SECRET: test-access-secret-123456
          JWT_REFRESH_SECRET: test-refresh-secret-123456

      - name: Build backend
        run: npm --workspace apps/api run build
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/civicwallet_test?schema=public
          JWT_ACCESS_SECRET: test-access-secret-123456
          JWT_REFRESH_SECRET: test-refresh-secret-123456

      - name: Build web app
        run: npm --workspace apps/web run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api

